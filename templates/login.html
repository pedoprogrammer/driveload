{% extends "base.html" %}
{% block title %}Log in — DriveLoad{% endblock %}
{% block body %}
<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:40px 16px;">
  <div style="width:100%;max-width:400px;">
    <div style="text-align:center;margin-bottom:28px;">
      <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:6px;">Welcome back</h1>
      <p class="text-sub text-sm">Log in to your DriveLoad account</p>
    </div>

    <div class="card">
      <form method="POST">
        <div class="form-group">
          <label>Email address</label>
          <input class="form-control" type="email" name="email" required
                 placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" name="password" required
                 placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <div class="flex items-center justify-between mb-4" style="font-size:.85rem;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--sub);">
            <input type="checkbox" name="remember"/> Remember me
          </label>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:11px;">
          Log in
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-sub mt-4">
      Don't have an account? <a href="/register">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}
