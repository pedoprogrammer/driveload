{% extends "base.html" %}
{% block title %}Log in — DriveLoad{% endblock %}
{% block body %}
<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:40px 16px;">
  <div style="width:100%;max-width:400px;">
    <div style="text-align:center;margin-bottom:28px;">
      <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:6px;">Welcome back</h1>
      <p class="text-sub text-sm">Log in to your DriveLoad account</p>
    </div>

    <!-- Google login -->
    <a href="/auth/google" class="btn w-full mb-3" style="justify-content:center;padding:11px;background:#fff;color:#1f1f1f;border:1px solid #ddd;font-weight:600;display:flex;align-items:center;gap:10px;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.1 33.1 29.6 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6-6C34.4 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.2-4z"/></svg>
      Continue with Google
    </a>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <hr style="flex:1;border-color:var(--muted);"/>
      <span class="text-sub text-xs">or</span>
      <hr style="flex:1;border-color:var(--muted);"/>
    </div>

    <div class="card">
      <form method="POST">
        <div class="form-group">
          <label>Email address</label>
          <input class="form-control" type="email" name="email" required
                 placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" name="password" required
                 placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <div class="flex items-center justify-between mb-4" style="font-size:.85rem;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--sub);">
            <input type="checkbox" name="remember"/> Remember me
          </label>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:11px;">
          Log in
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-sub mt-4">
      Don't have an account? <a href="/register">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}
