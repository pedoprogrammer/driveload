{% extends "base.html" %}
{% block title %}Create account — DriveLoad{% endblock %}
{% block body %}
<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:40px 16px;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:28px;">
      <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:6px;">Create your account</h1>
      <p class="text-sub text-sm">Free forever. No credit card required.</p>
    </div>

    <div class="card">
      <form method="POST">
        <div class="form-group">
          <label>Full name</label>
          <input class="form-control" type="text" name="name" required
                 placeholder="Ahmed" autocomplete="name"/>
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input class="form-control" type="email" name="email" required
                 placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password <span class="text-sub text-xs">(min. 6 characters)</span></label>
          <input class="form-control" type="password" name="password" required
                 placeholder="••••••••" autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:11px;">
          Create account
        </button>
      </form>
    </div>

    <div class="card mt-3" style="background:#0d0d1a;border-color:var(--muted);">
      <p class="text-sm text-sub" style="line-height:1.6;">
        ✓ Free plan: <strong style="color:var(--text);">3 downloads/month</strong><br/>
        ✓ Upgrade anytime to <strong style="color:var(--primary);">Pro</strong> for unlimited access
      </p>
    </div>

    <p class="text-center text-sm text-sub mt-4">
      Already have an account? <a href="/login">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
